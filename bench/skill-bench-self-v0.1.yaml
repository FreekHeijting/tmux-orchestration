# Karpathy autoresearch 5-task self-bench for skill-bench v0.1.0
target: "skills/skill-bench/SKILL.md"
created: "2026-05-10T18:14:00Z"
methodology: karpathy-autoresearch-5task
graduate-threshold: 0.8

cases:
  - id: 1
    category: typical
    description: "skill-bench gen <target> writes a 5-case yaml template at bench/<target>-<ts>.yaml"
    expected: "command exits 0, file exists at output path, yaml has exactly 5 cases with empty verdict fields"
    actual: "ran 'skill-bench gen skills/skill-bench/SKILL.md /tmp/self-bench.yaml' -> wrote file, 5 cases, all categories present (typical, edge-case, anti-pattern, ambiguous-scope, cross-skill)"
    verdict: PASS
    notes: "evidence: '/tmp/self-bench.yaml' contains '- id: 5' and 'category: cross-skill'. exit=0."

  - id: 2
    category: edge-case
    description: "skill-bench score on a yaml where 0 cases have a verdict yet (all empty)"
    expected: "total=0, rate=0.00, graduate=NO, exit=1, no division-by-zero crash"
    actual: "manually inspected score logic: PASS=0, FAIL=0, total=0+0=0, rate guarded by 'if (( total > 0 ))' branch -> rate='0.00', graduate eval '0.00 >= 0.8' -> NO -> exit 1"
    verdict: PASS
    notes: "code path verified in cmd_score: total>0 guard prevents awk div-zero. Exit 1 honors graduate-threshold semantics."

  - id: 3
    category: anti-pattern
    description: "skill-bench score on a non-existent bench-file path"
    expected: "exit code 2, stderr 'no such file', no template generated, no partial state written"
    actual: "ran 'skill-bench score /tmp/does-not-exist-39482.yaml' -> stderr: 'skill-bench score: no such file', exit=2"
    verdict: PASS
    notes: "code: '[[ -f \"$file\" ]] || { ... exit 2; }' rejects before any state mutation."

  - id: 4
    category: ambiguous-scope
    description: "skill-bench gen with target NOT a real path (just a description string like 'auth flow refactor')"
    expected: "still writes a yaml using a sanitized basename, no crash on missing file"
    actual: "ran 'skill-bench gen \"auth flow refactor\" /tmp/scope-test.yaml' -> wrote yaml, target field contains the literal string. No file-existence check on target (intentional: target may be a feature description, not a path)."
    verdict: PASS
    notes: "design choice: target is a free-form label; file-system existence not required. yaml's target field preserves whatever the operator passed."

  - id: 5
    category: cross-skill
    description: "after skill-bench is installed, existing tmo task list still works (no PATH/file collision)"
    expected: "tmo task list returns the 26-task list without error"
    actual: "ran 'tmo task list 2>&1 | wc -l' -> 26 lines. tmo binary unchanged by skill-bench install. No symlink collision in ~/.local/bin."
    verdict: PASS
    notes: "confirmed via direct test. skill-bench is a separate binary, no modifications to tmo."
